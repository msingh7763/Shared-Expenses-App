services:
  - type: web
    name: spreetail-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: spreetail-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: USD_TO_INR_RATE
        value: "84.5"
      - key: FRONTEND_URL
        sync: false   # set manually in Render dashboard after Vercel deploy
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: spreetail-db
    databaseName: spreetail_db
    user: spreetail
    plan: free
